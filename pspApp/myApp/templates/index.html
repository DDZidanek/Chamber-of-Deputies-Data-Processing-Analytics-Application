{%load static%}
<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Data z poslanecké sněmovny</title>

    <link href="{% static 'css/datatables.css' %}" rel="stylesheet" />
    <link href="{% static 'css/bootstrap.css' %}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>

</head>
<body class="sb-nav-fixed">
    <nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
        <!-- Navbar Brand-->
        <a class="navbar-brand ps-3" href="{% url 'index' %}">PsP Data</a>
        <!-- Sidebar Toggle-->
        <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0" id="sidebarToggle" href="#!"><i
                class="fas fa-bars"></i></button>
    </nav>
    <div id="layoutSidenav">
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
                <div class="sb-sidenav-menu">
                    <div class="nav">
                        <div class="sb-sidenav-menu-heading">Nabídka</div>
                        <a class="nav-link" href="{% url 'charts' %}">
                            <div class="sb-nav-link-icon"><i class="fas fa-chart-area"></i></div>
                            Grafy
                        </a>
                        <a class="nav-link" href="{% url 'tables' %}">
                            <div class="sb-nav-link-icon"><i class="fas fa-table"></i></div>
                            Tabulky
                        </a>
                        <a class="nav-link" href="{% url 'cluster' %}">
                            <div class="sb-nav-link-icon"><i class="fas fa-chart-area"></i></div>
                            Shlukování hlasů
                        </a>
                    </div>
                </div>
            </nav>
        </div>
        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid mx-auto" style="width: 100% ;max-width: 1400px;">

                    {% block content %}
                    {% endblock %}

                </div>
            </main>
            <footer class="py-4 bg-light mt-5">
                <div class="container-fluid px-4">
                    <div class="d-flex align-items-center justify-content-between small">
                        <div class="text-muted">Vizualizace dat z poslanecké sněmovny</div>
                        <div>
                            <a href="https://www.psp.cz/sqw/hp.sqw?k=1300">POSLANECKÁ SNĚMOVNA PARLAMENTU ČESKÉ REPUBLIKY</a>
                        </div>
                    </div>
                </div>
            </footer>
        </div>
    </div>
    <script src="{% static 'js/scripts.js' %}"></script>
    <script src="{% static 'js/datatables-simple-demo.js' %}"></script>
    <script src="{% static 'js/jquery.js' %}"></script>
    <script src="{% static 'js/bootstrap.js' %}"></script>
    <script src="{% static 'js/dataTables.js' %}"></script>
    <script src="{% static 'js/bootstrap.js' %}"></script>
    <script src="{% static 'js/dataTables.bootstrap5.js' %}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js" charset="utf-8"></script>
    <script src="{% static 'assets/demo/color.js' %}"></script>
    <script src="{% static 'assets/demo/obsazeniSnemovnyBar.js' %}"></script>
    <script src="{% static 'assets/demo/obsazeniSnemovnyPie.js' %}"></script>
    <script src="{% static 'assets/demo/krajeStranyGraf.js' %}"></script>
    <script src="{% static 'assets/demo/hlasovaniGraf.js' %}"></script>
    <script src="{% static 'assets/demo/genderGraf.js' %}"></script>
    <script src="{% static 'assets/demo/vekGraf.js' %}"></script>
    <script src="{% static 'assets/demo/vyboryGraf.js' %}"></script>
    <script src="{% static 'assets/demo/histogramVybory.js' %}"></script>
    <script src="{% static 'assets/demo/clusteringHlasovani.js' %}"></script>
</body>

</html>
